services:
  - type: web
    name: pixii-api
    env: python
    rootDir: backend
    plan: starter
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn pixii_api.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 300
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_DEFAULT_MODEL
        value: moonshotai/kimi-k2.6
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_IMAGE_MODEL
        value: gemini-2.0-flash-preview-image-generation
      - key: MAX_RETRY_BUDGET
        value: "3"
      - key: N_CANDIDATES
        value: "3"
      - key: WEB_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
